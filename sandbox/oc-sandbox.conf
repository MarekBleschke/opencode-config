[general]
# Default profile used when --profile is not specified at runtime.
# Override per-run with: oc-sandbox run --profile <name>
default_profile = base

[git]
# Populated by 'oc-sandbox install' from host ~/.gitconfig
# Leave empty to skip git identity in the container
user_name =
user_email =

[profile.superpowers]
# Per-agent model mappings for the superpowers profile
# Values are opencode model identifiers
brainstorm = opencode-go/glm-5.1
planner = opencode-go/kimi-k2.6
debugger = opencode-go/glm-5.1
execution-orchestrator = opencode-go/kimi-k2.5
software-engineer = opencode-go/kimi-k2.5
senior-software-engineer = opencode-go/kimi-k2.6
code-reviewer = opencode-go/glm-5.1
spec-reviewer = opencode-go/glm-5
utility = opencode-go/minimax-m2.7

[mounts]
# Host paths mounted into the sandbox container: src_path|container_dst_path
# Use ~/ for home directory references (expanded at runtime)
ssh_key = ~/.ssh/id_rsa|/home/sandbox/.ssh/id_rsa
auth_json = ~/.local/share/opencode/auth.json|/home/sandbox/.local/share/opencode/auth.json
